server:
  port: 8082

spring:
  application:
    name: drilling-service
  datasource:
    url: jdbc:h2:mem:drillingdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cloud:
    consul:
      host: 127.0.0.1
      port: 8500
      discovery:
        prefer-ip-address: true
        register: true
        service-name: drilling-service

logging:
  level:
    org.springframework.web: INFO

python:
  predictor:
    base-url: http://127.0.0.1:8000
