apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: welllog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.18
          args:
            - agent
            - -server
            - -bootstrap
            - -ui
            - -client=0.0.0.0
          ports:
            - containerPort: 8500
---
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: welllog
spec:
  selector:
    app: consul
  ports:
    - port: 8500
      targetPort: 8500
