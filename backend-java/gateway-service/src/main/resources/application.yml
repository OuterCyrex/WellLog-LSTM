server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: drilling-service
          uri: lb://drilling-service
          predicates:
            - Path=/api/health,/api/wells/**,/api/predictions/**
  consul:
    host: 127.0.0.1
    port: 8500
    discovery:
      prefer-ip-address: true
      register: true
      service-name: gateway-service

logging:
  level:
    org.springframework.cloud.gateway: INFO
